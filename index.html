<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        :root { --bg-color: #0a0a0a; --text-color: #ffffff; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; font-family: 'Inter', sans-serif; }

        /* --- 顶部全屏大图轮播 --- */
        .hero-swiper {
            width: 100%;
            height: 100vh;
        }
        .swiper-slide {
            position: relative;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .hero-content {
            z-index: 10;
            text-align: center;
            pointer-events: none; /* 让点击穿透到背景的链接上 */
        }
        .hero-link {
            position: absolute;
            inset: 0;
            z-index: 5;
        }
        h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; font-style: italic; letter-spacing: 4px; margin: 0; }

        /* --- 底部作品集入口网格 --- */
        .container { padding: 80px 5vw; }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 25px; 
        }
        .portfolio-entry {
            position: relative;
            overflow: hidden;
            border-radius: 2px;
            aspect-ratio: 3/2;
            cursor: pointer;
        }
        .portfolio-entry img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s cubic-bezier(0.2, 1, 0.3, 1);
        }
        /* 封面信息遮罩 */
        .entry-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .portfolio-entry:hover img { transform: scale(1.1); }
        .portfolio-entry:hover .entry-overlay { opacity: 1; }
        .entry-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 2px; }

        /* 移动端适配 */
        @media (max-width: 600px) { h1 { font-size: 2rem; } }
    </style>
</head>
<body>

<div class="swiper hero-swiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide" style="background-image: url('cover1.jpg');">
            <a href="series-01/index.html" class="hero-link"></a>
            <div class="hero-content"><h1>Sea & Reef</h1><p>View Collection</p></div>
        </div>
        <div class="swiper-slide" style="background-image: url('cover2.jpg');">
            <a href="series-02/index.html" class="hero-link"></a>
            <div class="hero-content"><h1>Urban Abstract</h1><p>In Progress</p></div>
        </div>
    </div>
    <div class="swiper-pagination"></div>
</div>

<div class="container">
    <div class="gallery">
        <a href="series-01/index.html" class="portfolio-entry">
            <img src="cover1.jpg">
            <div class="entry-overlay"><div class="entry-title">SEA & REEF</div></div>
        </a>
        
        <a href="series-02/index.html" class="portfolio-entry">
            <img src="cover2.jpg">
            <div class="entry-overlay"><div class="entry-title">UNFINISHED</div></div>
        </a>
        
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const swiper = new Swiper('.hero-swiper', {
        loop: true,
        autoplay: { delay: 5000 }, // 5秒换一张
        pagination: { el: '.swiper-pagination', clickable: true },
        effect: 'fade', // 淡入淡出转场，更具电影感
        fadeEffect: { crossFade: true }
    });
</script>

</body>
</html>
