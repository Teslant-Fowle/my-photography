<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a; /* 极深黑，增加沉浸感 */
            --text-color: #ffffff;
            --accent-color: #d4af37; /* 金色点缀 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 动态导航栏 */
        header {
            height: 100vh; /* 首页全屏 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('your-cover-photo.jpg'); /* 这里可以放一张封面图 */
            background-size: cover;
            background-position: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-style: italic;
            margin: 0;
            letter-spacing: 4px;
            animation: fadeInUp 1.5s ease;
        }

        .subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: #888;
            margin-top: 20px;
        }

        /* 照片网格 - 瀑布流布局 */
        .container {
            padding: 100px 5vw;
        }

        .gallery {
            column-count: 3; /* 三栏布局 */
            column-gap: 20px;
        }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            border-radius: 4px; /* 微圆角更精致 */
        }

        .gallery-item img {
            width: 100%;
            display: block;
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
            filter: grayscale(20%); /* 淡淡的灰度增加艺术感 */
        }

        /* 悬浮交互：照片变亮并轻微放大 */
        .gallery-item:hover img {
            transform: scale(1.03);
            filter: grayscale(0%);
        }

        /* 进场动画 */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式：手机端自动变一栏 */
        @media (max-width: 900px) {
            .gallery { column-count: 2; }
            h1 { font-size: 2.5rem; }
        }
        @media (max-width: 600px) {
            .gallery { column-count: 1; }
        }
    </style>
</head>
<body>

<header>
    <h1>The Moment</h1>
    <div class="subtitle">Personal Photography Archive</div>
</header>

<div class="container">
    <div class="gallery">
        <div class="gallery-item"><img src="7.jpg"></div>
        <div class="gallery-item"><img src="8.jpg"></div>
        <div class="gallery-item"><img src="photo3.jpg"></div>
        <div class="gallery-item"><img src="photo4.jpg"></div>
        <div class="gallery-item"><img src="photo5.jpg"></div>
        <div class="gallery-item"><img src="photo6.jpg"></div>
    </div>
</div>

<footer style="padding: 100px; text-align: center; color: #444; font-size: 0.8rem; letter-spacing: 2px;">
    &copy; 2026 YOUR NAME. ALL RIGHTS RESERVED.
</footer>

</body>
</html>
